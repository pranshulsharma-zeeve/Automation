openapi: 3.0.3
info:
  title: Foundation Pack API
  version: 1.0.0
  description: API contracts for generating and managing Foundation Pack artifacts.
servers:
  - url: https://api.example.com
paths:
  /projects:
    post:
      summary: Create project workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /projects/{projectId}/artifacts/{artifactType}:
    put:
      summary: Upsert artifact content
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
        - in: path
          name: artifactType
          required: true
          schema:
            type: string
            enum: [brief, priorities, scope, architecture, user_flows, process_flows, wireframes, branding, design_system, api_contract, acceptance_matrix, test_strategy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactUpsertRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /projects/{projectId}/open-questions:
    post:
      summary: Add unresolved question
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenQuestionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenQuestion'
  /projects/{projectId}/readiness:
    get:
      summary: Get foundation readiness status
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Readiness summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessSummary'
components:
  schemas:
    Project:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          example: proj_123
        name:
          type: string
          example: Q3 Onboarding Revamp
        description:
          type: string
          example: Documentation-first project setup
        createdAt:
          type: string
          format: date-time
    ArtifactUpsertRequest:
      type: object
      required: [content, updatedBy]
      properties:
        content:
          type: string
          example: "# Product Brief\n..."
        updatedBy:
          type: string
          example: user_456
        status:
          type: string
          enum: [draft, in_review, approved]
    Artifact:
      type: object
      required: [artifactType, content, status, updatedAt]
      properties:
        artifactType:
          type: string
          example: brief
        content:
          type: string
        status:
          type: string
          enum: [draft, in_review, approved]
        updatedAt:
          type: string
          format: date-time
    OpenQuestionRequest:
      type: object
      required: [question, owner]
      properties:
        question:
          type: string
          example: What SSO provider is required?
        owner:
          type: string
          example: product_manager
        impactedArtifacts:
          type: array
          items:
            type: string
    OpenQuestion:
      type: object
      required: [id, question, owner, status]
      properties:
        id:
          type: string
          example: oq_001
        question:
          type: string
        owner:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved]
    ReadinessSummary:
      type: object
      required: [projectId, readyForBacklog, missingArtifacts, blockingQuestions]
      properties:
        projectId:
          type: string
          example: proj_123
        readyForBacklog:
          type: boolean
          example: false
        missingArtifacts:
          type: array
          items:
            type: string
          example: ["test_strategy"]
        blockingQuestions:
          type: integer
          example: 3
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Artifact content is missing required section: MVP goals.
