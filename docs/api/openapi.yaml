openapi: 3.0.3
info:
  title: GolDefi Platform API
  version: 1.1.0
  description: >-
    Core API contracts for GolDefi onboarding, KYC gating, orders, payments,
    tokenization, redemption, distributor workflows, audit operations, and
    asynchronous provider callbacks.
servers:
  - url: https://api.goldefi.example.com/v1
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a user account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration initiated; email OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /auth/verify-email-otp:
    post:
      summary: Verify email OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /kyc/status:
    get:
      summary: Retrieve KYC status for current user
      tags: [KYC]
      responses:
        '200':
          description: KYC status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycStatusResponse'
  /wallets/bind:
    post:
      summary: Bind wallet address after signature verification
      tags: [Wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WalletBindRequest'
      responses:
        '200':
          description: Wallet bound
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBindResponse'
  /orders/quote:
    post:
      summary: Get quote for token purchase
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Quote generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
  /orders:
    post:
      summary: Create purchase order
      tags: [Orders]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /orders/{orderId}:
    get:
      summary: Get order details by ID
      tags: [Orders]
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /distributor/orders/lookup:
    post:
      summary: Lookup cash order by orderId and user email
      tags: [Distributor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, userEmail]
              properties:
                orderId:
                  type: string
                userEmail:
                  type: string
                  format: email
      responses:
        '200':
          description: Order found and OTP triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  otpSent:
                    type: boolean
                    example: true
  /distributor/orders/{orderId}/cash-payment:
    post:
      summary: Register cash payment with OTP and signature
      tags: [Distributor]
      parameters:
        - in: path
          name: orderId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CashPaymentRequest'
      responses:
        '200':
          description: Cash payment recorded and mint initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: boolean
                    example: true
                  orderStatus:
                    type: string
                    example: PAYMENT_CONFIRMED
  /redemptions:
    post:
      summary: Create redemption request
      tags: [Redemption]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedemptionRequest'
      responses:
        '201':
          description: Redemption request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedemptionResponse'
  /audits:
    post:
      summary: Create audit request
      tags: [Audit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditRequest'
      responses:
        '201':
          description: Audit request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditResponse'
  /audits/{auditId}/submit:
    post:
      summary: Submit signed audit findings and documents
      tags: [Audit]
      parameters:
        - in: path
          name: auditId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAuditRequest'
      responses:
        '200':
          description: Audit submission accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditResponse'

  # Asynchronous provider callbacks
  /webhooks/payments/{provider}:
    post:
      summary: Receive payment provider callback event
      tags: [Webhooks]
      security:
        - webhookSignature: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum: [CRYPTO_USDT, CARD, BANK]
        - $ref: '#/components/parameters/WebhookSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookEvent'
      responses:
        '202':
          description: Event accepted for async processing
        '401':
          $ref: '#/components/responses/Unauthorized'
  /webhooks/kyc/sumsub:
    post:
      summary: Receive KYC provider status callback
      tags: [Webhooks]
      security:
        - webhookSignature: []
      parameters:
        - $ref: '#/components/parameters/WebhookSignature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycWebhookEvent'
      responses:
        '202':
          description: Event accepted for async processing

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSignature:
      type: apiKey
      in: header
      name: X-Signature

  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        type: string
      description: Unique key used to prevent duplicate request side-effects.
    WebhookSignature:
      in: header
      name: X-Signature
      required: true
      schema:
        type: string
      description: Provider signature used to verify callback authenticity.

  responses:
    BadRequest:
      description: Validation or policy failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication/signature failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Idempotency or state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    RegisterRequest:
      type: object
      required: [dob, country, profession, sector, declarationAccepted, name, email, phone, password]
      properties:
        dob:
          type: string
          format: date
        country:
          type: string
        profession:
          type: string
        sector:
          type: string
        annualRevenue:
          type: string
        declarationAccepted:
          type: boolean
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          format: password
    RegisterResponse:
      type: object
      properties:
        userId:
          type: string
          example: usr_7f9a
        status:
          type: string
          example: OTP_PENDING
    KycStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, PENDING_REVIEW, APPROVED, REJECTED]
        reasonCode:
          type: string
          nullable: true
    WalletBindRequest:
      type: object
      required: [walletAddress, challenge, signature]
      properties:
        walletAddress:
          type: string
        challenge:
          type: string
        signature:
          type: string
    WalletBindResponse:
      type: object
      properties:
        walletAddress:
          type: string
        verified:
          type: boolean
    QuoteRequest:
      type: object
      required: [gdiAmount, paymentMethod]
      properties:
        gdiAmount:
          type: string
        paymentMethod:
          type: string
          enum: [CRYPTO_USDT, CARD, BANK, CASH]
    QuoteResponse:
      type: object
      properties:
        quoteId:
          type: string
        gdiAmount:
          type: string
        platformFeeGdi:
          type: string
        totalPayable:
          type: string
        expiresAt:
          type: string
          format: date-time
    CreateOrderRequest:
      type: object
      required: [quoteId, paymentMethod]
      properties:
        quoteId:
          type: string
        paymentMethod:
          type: string
          enum: [CRYPTO_USDT, CARD, BANK, CASH]
    OrderResponse:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
          enum: [DRAFT, SUBMITTED, PAYMENT_PENDING, PAID, MINTED, FAILED, CANCELLED]
        gdiAmount:
          type: string
        paymentMethod:
          type: string
        blockchainTxHash:
          type: string
          nullable: true
    CashPaymentRequest:
      type: object
      required: [userOtp, amountReceived, distributorSignature]
      properties:
        userOtp:
          type: string
        amountReceived:
          type: string
        distributorSignature:
          type: string
    RedemptionRequest:
      type: object
      required: [gdiAmount, shippingAddressId]
      properties:
        gdiAmount:
          type: string
        shippingAddressId:
          type: string
    RedemptionResponse:
      type: object
      properties:
        redemptionId:
          type: string
    RedemptionRequest:
      type: object
      required: [gdiAmount, shippingAddressId]
      properties:
        gdiAmount:
          type: string
        shippingAddressId:
          type: string
    RedemptionResponse:
      type: object
      properties:
        redemptionId:
          type: string
          example: red_332
        status:
          type: string
          enum: [REQUESTED, VERIFIED, LOCKED, BURNED, FULFILLMENT, COMPLETED, FAILED]
    CreateAuditRequest:
      type: object
      required: [vaultName, plannedDate]
      properties:
        vaultName:
          type: string
        plannedDate:
          type: string
          format: date
    SubmitAuditRequest:
      type: object
      required: [status, findings, documentRefs, digitalSignature]
      properties:
        status:
          type: string
          enum: [AUDITED, EXCEPTION, CANCELLED]
        findings:
          type: string
        documentRefs:
          type: array
          items:
            type: object
            properties:
              fileName:
                type: string
              hashRef:
                type: string
        digitalSignature:
          type: string
    PaymentWebhookEvent:
      type: object
      required: [eventId, orderId, providerStatus, occurredAt]
      properties:
        eventId:
          type: string
        orderId:
          type: string
        providerStatus:
          type: string
          enum: [CONFIRMED, FAILED, PENDING]
        occurredAt:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    KycWebhookEvent:
      type: object
      required: [eventId, applicantId, kycStatus, occurredAt]
      properties:
        eventId:
          type: string
        applicantId:
          type: string
        kycStatus:
          type: string
          enum: [PENDING_REVIEW, APPROVED, REJECTED]
        occurredAt:
          type: string
          format: date-time
        reasonCode:
          type: string
          nullable: true
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum:
            - POLICY_BLOCKED
            - VALIDATION_ERROR
            - SIGNATURE_INVALID
            - IDEMPOTENCY_CONFLICT
            - STATE_CONFLICT
            - NOT_FOUND
        message:
          type: string
        details:
          type: object
          additionalProperties: true
